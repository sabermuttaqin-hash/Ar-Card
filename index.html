<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Singa 3D</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="info">Scan kartu singa</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <a-asset-item id="lionModel" src="./singa.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity light="type: ambient; intensity: 1.2"></a-entity>
  <a-entity light="type: directional; intensity: 1" position="0 1 1"></a-entity>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-gltf-model
      src="#lionModel"
      position="0 -0.15 0"
      rotation="0 180 0"
      scale="0.1 0.1 0.1"
    ></a-gltf-model>

    <a-text
      value="أَسَد"
      position="0 -0.75 0"
      align="center"
      color="#FFD54F"
      width="4"
      side="double"
      look-at="[camera]"
    ></a-text>

  </a-entity>

</a-scene>

</body>
</html>
